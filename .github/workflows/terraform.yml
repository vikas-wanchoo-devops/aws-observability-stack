name: Observability Stack Setup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------------
  # Stage 1: Terraform Infrastructure
  # -------------------------------
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879696522469:role/GitHubActionsCICDRole
          aws-region: eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Import ECS Services
        run: |
          terraform import aws_ecs_service.prometheus arn:aws:ecs:eu-north-1:879696522469:service/assaabloy-app-cluster/prometheus-service || true
          terraform import aws_ecs_service.grafana arn:aws:ecs:eu-north-1:879696522469:service/assaabloy-app-cluster/grafana-service || true
          terraform import aws_ecs_service.kafka arn:aws:ecs:eu-north-1:879696522469:service/assaabloy-app-cluster/kafka-service || true
          terraform import aws_ecs_service.cloudwatch_exporter arn:aws:ecs:eu-north-1:879696522469:service/assaabloy-app-cluster/cloudwatch-exporter-service || true
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

  # -------------------------------
  # Stage 2: Observability Setup
  # -------------------------------
  observability:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879696522469:role/GitHubActionsCICDRole
          aws-region: eu-north-1

      - name: Refresh ECS Services (Prometheus, Grafana, Kafka, CloudWatch Exporter)
        run: |
          aws ecs update-service --cluster assaabloy-app-cluster --service prometheus-service --force-new-deployment
          aws ecs update-service --cluster assaabloy-app-cluster --service grafana-service --force-new-deployment
          aws ecs update-service --cluster assaabloy-app-cluster --service kafka-service --force-new-deployment
          aws ecs update-service --cluster assaabloy-app-cluster --service cloudwatch-exporter-service --force-new-deployment
